<p *ngIf="loading">Loading...</p>

<div *ngIf="order$ | async as order">
  <h2>Order Details</h2>
  <p>Order ID: {{ order.id }}</p>

  <h3>Products:</h3>
  <ul>
    <li *ngFor="let item of order.products">
      <p>{{ item.name }}</p>
      <p>Quantity: {{ item.quantity }}</p>
    </li>
  </ul>
</div>
