<div *ngIf="orders$ | async as orders">

  <div *ngIf="orders.length === 0; else ordersList">
    No orders found
  </div>

  <ng-template #ordersList>
    <div *ngFor="let order of orders">
      <p>{{ order.id }}</p>
      <button (click)="handleInspectOrder(order.id)">
        Inspect Order
      </button>
    </div>
  </ng-template>

</div>
